{% set name = "adam-robotics" %}
{% set version = "0.5.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/gbionics/adam/archive/refs/tags/v{{ version }}.tar.gz
  sha256: c57eb3357fdab3c81408adccf22d089cc0c16b09dfecbf4f452eb5c62ad5e202

build:
  number: 0
  noarch: python

requirements:
  host:
    - python
  run:
    - python

outputs:
  - name: {{ name|lower }}
    build:
      noarch: python
      script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python  {{ python_min }}
        - pip
        - wheel
        - setuptools
      run:
        - python  >={{ python_min }}
        - numpy
        - scipy
        - prettytable
        - urdfdom-py
        - array-api-compat
    test:
      source_files:
        - tests
      commands:
        - pytest ./tests/ -v -k "not gravity" --ignore-glob=*Jax* --ignore-glob=*jax* --ignore-glob=*pytorch* --ignore-glob=*CasADi* --ignore-glob=*casadi* --ignore-glob=*idyntree* --ignore-glob=*mujoco* --ignore-glob=*inverse_kinematics*
      requires:
        - python  {{ python_min }}
        - pip
        - pytest
        - icub-models
        - idyntree
        # Workaround for https://github.com/conda-forge/adam-robotics-feedstock/pull/19#issuecomment-3409763425
        - xorg-libxxf86vm
        - git
        - gitpython
        - requests

  - name: {{ name|lower }}-casadi
    build:
      noarch: python
    requirements:
      host:
        - python  {{ python_min }}
      run:
        - {{ pin_subpackage('adam-robotics', max_pin='x.x.x') }}
        - casadi
        - liecasadi
        - python  >={{ python_min }}
    test:
      source_files:
        - tests
      commands:
        - pytest ./tests/ -v -k "not gravity" --ignore-glob=*Jax* --ignore-glob=*jax* --ignore-glob=*pytorch* --ignore-glob=*mujoco*
      requires:
        - python  {{ python_min }}
        - pip
        - pytest
        - icub-models
        - idyntree
        # Workaround for https://github.com/conda-forge/adam-robotics-feedstock/pull/19#issuecomment-3409763425
        - xorg-libxxf86vm
        - git
        - gitpython
        - casadi
        - liecasadi
        - requests

  - name: {{ name|lower }}-jax
    build:
      noarch: python
    requirements:
      host:
        - python  {{ python_min }}
      run:
        - {{ pin_subpackage('adam-robotics', max_pin='x.x.x') }}
        - jax
        - python  >={{ python_min }}
    test:
      source_files:
        - tests
      commands:
        - pytest ./tests/ -v -k "not gravity" --ignore-glob=*pytorch* --ignore-glob=*CasADi* --ignore-glob=*casadi* --ignore-glob=*idyntree* --ignore-glob=*mujoco* --ignore-glob=*inverse_kinematics*
      requires:
        - python  {{ python_min }}
        - pip
        - pytest
        - icub-models
        - idyntree
        # Workaround for https://github.com/conda-forge/adam-robotics-feedstock/pull/19#issuecomment-3409763425
        - xorg-libxxf86vm
        - git
        - gitpython
        - jax >0.3.0
        - requests

  - name: {{ name|lower }}-pytorch
    build:
      noarch: python
    requirements:
      host:
        - python  {{ python_min }}
      run:
        - {{ pin_subpackage('adam-robotics', max_pin='x.x.x') }}
        - pytorch
        - python  >={{ python_min }}
    test:
      source_files:
        - tests
      commands:
        - pytest ./tests/ -v -k "not gravity" --ignore-glob=*Jax*  --ignore-glob=*jax* --ignore-glob=*CasADi* --ignore-glob=*casadi* --ignore-glob=*idyntree* --ignore-glob=*pytorch_batch* --ignore-glob=*mujoco* --ignore-glob=*inverse_kinematics*
      requires:
        - python  {{ python_min }}
        - pip
        - pytest
        - icub-models
        - idyntree
        # Workaround for https://github.com/conda-forge/adam-robotics-feedstock/pull/19#issuecomment-3409763425
        - xorg-libxxf86vm
        - git
        - gitpython
        - pytorch
        - jax  >0.3.0
        - requests

  - name: {{ name|lower }}-all
    build:
      noarch: python
    requirements:
      host:
        - python  {{ python_min }}
      run:
        - {{ pin_subpackage('adam-robotics-casadi', max_pin='x.x.x') }}
        - {{ pin_subpackage('adam-robotics-jax', max_pin='x.x.x') }}
        - {{ pin_subpackage('adam-robotics-pytorch', max_pin='x.x.x') }}
        - python  >={{ python_min }}
    test:
      source_files:
        - tests
      commands:
        - pytest ./tests/ -v -k "not gravity" --ignore-glob=*pytorch_batch*
      requires:
        - python  {{ python_min }}
        - pip
        - pytest
        - icub-models
        - idyntree
        # Workaround for https://github.com/conda-forge/adam-robotics-feedstock/pull/19#issuecomment-3409763425
        - xorg-libxxf86vm
        - git
        - gitpython
        - casadi
        - pytorch
        - jax  >0.3.0
        - requests
        - mujoco
        - robot_descriptions

about:
  home: https://github.com/gbionics/adam
  summary: ADAM implements a collection of algorithms for calculating rigid-body dynamics in Jax, CasADi, PyTorch, and NumPy.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - traversaro
    - Giulero
    - xela-95
